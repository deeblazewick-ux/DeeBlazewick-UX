<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1e2d42" />
    <meta name="color-scheme" content="dark" />
    <meta
      name="description"
      content="Ladder Day: tweak one letter from the last word each hop — real words only — hop your way to the goal."
    />
    <title>Ladder Day</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main>
      <header class="page-header">
        <h1>Ladder Day</h1>
        <p class="lede">
          Tiptoe up the ladder: change <strong>one letter</strong> from the <strong>previous</strong> word each hop, and keep it to
          <strong>real words</strong> only. Keep hopping until you land on the <strong>goal</strong>.
        </p>
      </header>

      <section class="panel" aria-label="Ladder puzzle">
        <div class="panel-section">
          <div id="puzzle-anchors" class="puzzle-anchors" aria-label="Start and goal words"></div>
          <div id="ladder-rows" class="ladder-rows" aria-label="Words played after the start word"></div>
        </div>

        <div class="panel-section input-section">
          <h2 id="typing-heading" class="section-label" tabindex="-1">Type the next word</h2>
          <div id="current-entry" class="current-entry">
            <div id="current-row" class="row current-wrap" role="group" aria-label="Current typing"></div>
            <input
              id="word-input"
              class="word-input"
              type="text"
              inputmode="text"
              maxlength="5"
              enterkeyhint="go"
              autocapitalize="characters"
              autocomplete="off"
              autocorrect="off"
              spellcheck="false"
              aria-label="Your next five-letter word — use your device keyboard"
            />
          </div>
          <div id="keyboard" class="keyboard" aria-label="On-screen keyboard"></div>
        </div>

        <p id="status" class="status" role="status" aria-live="polite"></p>

        <div class="difficult-row">
          <button
            type="button"
            id="difficult-mode"
            class="difficult-switch"
            role="switch"
            aria-checked="false"
            aria-labelledby="difficult-title"
            aria-describedby="difficult-hint"
          >
            <span class="difficult-switch-track" aria-hidden="true">
              <span class="difficult-switch-thumb"></span>
            </span>
          </button>
          <div class="difficult-copy">
            <span id="difficult-title" class="difficult-title">Difficult mode</span>
            <p id="difficult-hint" class="difficult-hint"></p>
          </div>
        </div>

        <div class="actions">
          <button type="button" id="btn-copy" class="secondary hidden">Copy result</button>
          <button type="button" id="btn-undo" class="secondary">Undo last step</button>
          <div class="actions-row">
            <button type="button" id="btn-today" class="primary">Today’s ladder</button>
            <button type="button" id="btn-practice" class="secondary tight">Random</button>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
