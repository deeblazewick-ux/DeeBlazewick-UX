<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1e2d42" />
    <meta name="color-scheme" content="dark" />
    <meta
      name="description"
      content="Ladder Day: change one letter at a time from a start word to a goal word — every step must be a real word."
    />
    <title>Ladder Day</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main>
      <header class="page-header">
        <h1>Ladder Day</h1>
        <p class="lede">Change <strong>one letter</strong> per step. Every step must be a <strong>real word</strong>. Reach the <strong>goal</strong>.</p>
      </header>

      <section class="panel" aria-label="Ladder puzzle">
        <div class="panel-section">
          <h2 class="section-label">Your path</h2>
          <div id="ladder-rows" class="ladder-rows" aria-label="Words played so far"></div>
        </div>

        <div id="goal-banner" class="goal-banner" aria-label="Goal word"></div>

        <div class="panel-section input-section">
          <h2 id="typing-heading" class="section-label" tabindex="-1">Type the next word</h2>
          <div id="current-row" class="row current-wrap" role="group" aria-label="Current typing"></div>
          <div id="keyboard" class="keyboard" aria-label="On-screen keyboard"></div>
        </div>

        <p id="status" class="status" role="status" aria-live="polite"></p>

        <div class="par-hint-row">
          <button type="button" id="btn-par-hint" class="ghost-btn">Show shortest length</button>
        </div>
        <p id="par-note" class="par-note" aria-live="polite"></p>

        <div class="actions">
          <button type="button" id="btn-copy" class="secondary hidden">Copy result</button>
          <button type="button" id="btn-undo" class="secondary">Undo last step</button>
          <div class="actions-row">
            <button type="button" id="btn-today" class="primary">Today’s ladder</button>
            <button type="button" id="btn-practice" class="secondary tight">Random</button>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
