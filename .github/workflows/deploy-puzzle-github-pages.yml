# Deploy static prototypes (/puzzle, /ladderday; redirects from /antiwordle) to GitHub Pages.
# After first push: Repo → Settings → Pages → Build: GitHub Actions.

name: Deploy prototypes to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Site: /<repo>/puzzle/, /<repo>/ladderday/; /<repo>/antiwordle/ redirects to ladderday
      - name: Assemble site (puzzle + ladderday + redirects + hub)
        run: |
          mkdir -p _site/puzzle _site/ladderday _site/antiwordle _site/anti-wordle
          cp -r Puzzle/index.html Puzzle/css Puzzle/js _site/puzzle/
          cp -r ladderday/index.html ladderday/css ladderday/js _site/ladderday/
          cp .github/pages-redirect-antiwordle/index.html _site/antiwordle/index.html
          cp .github/pages-redirect-anti-wordle/index.html _site/anti-wordle/index.html
          cp .github/pages-root/index.html _site/index.html

      - name: Upload static artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
