# Deploy /Puzzle to GitHub Pages (static site).
# After first push: Repo → Settings → Pages → Build: GitHub Actions.

name: Deploy Puzzle to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Site lives at /<repo>/puzzle/ (project Pages base + /puzzle/)
      - name: Assemble site (puzzle/ + root redirect)
        run: |
          mkdir -p _site/puzzle
          cp -r Puzzle/index.html Puzzle/css Puzzle/js _site/puzzle/
          cp .github/pages-root/index.html _site/index.html

      - name: Upload static artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
